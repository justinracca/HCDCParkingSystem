<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCDC Parking System</title>

  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/login.css">
</head>

<body>

<div class="login-container">

  <div class="login-left">
  </div>

  <div class="login-right">

    <div class="login-card">
      <div class="card-header">
        <h1>HCDC Parking System</h1>
        <p>Holy Cross of Davao College</p>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Log In</button>
        <button class="tab-btn" data-tab="signup">Sign Up</button>
      </div>

      <div id="login" class="tab-content active">
        <h2>Welcome Back</h2>
        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input type="text" id="loginEmail" placeholder="Enter email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter password">
          </div>
          <button type="submit" class="btn btn-primary btn-full">Log In</button>
        </form>
      </div>

      <div id="signup" class="tab-content">
        <h2>Create Account</h2>
        <form id="signupForm">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="text" id="signupEmail" placeholder="Enter email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="Enter password">
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm password">
          </div>
          <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
      </div>

    </div>

  </div>

</div>

<script src="../js/index.js"></script>
</body>
</html>
